<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cowork+ AI 도우미</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --cyan:#00C6FF;
  --blue:#1A6BFF;
  --navy:#1a3260;
  --grad:linear-gradient(135deg,#1A6BFF,#00C6FF);
  --grad-r:linear-gradient(135deg,#00C6FF,#1A6BFF);
  --glass:rgba(255,255,255,0.62);
  --glass-border:rgba(255,255,255,0.85);
  --shadow:0 8px 32px rgba(26,107,255,0.10);
}

html,body{
  height:100%;
  font-family:'Pretendard',sans-serif;
  background:#f0f4ff;
  overflow:hidden;
}

/* ── Background ── */
.bg{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(160deg,#e8eeff 0%,#dff0ff 35%,#f5f0ff 65%,#ffffff 100%);
}
.blob{
  position:absolute;border-radius:50%;filter:blur(72px);opacity:0.55;
  animation:drift 14s ease-in-out infinite alternate;
}
.blob1{width:520px;height:520px;background:radial-gradient(circle,#b8d4ff,transparent 70%);top:-120px;left:-100px;animation-duration:16s;}
.blob2{width:440px;height:440px;background:radial-gradient(circle,#c8e8ff,transparent 70%);bottom:-80px;right:-80px;animation-duration:19s;animation-delay:-5s;}
.blob3{width:320px;height:320px;background:radial-gradient(circle,#ddd4ff,transparent 70%);top:40%;left:55%;animation-duration:22s;animation-delay:-9s;}
.blob4{width:260px;height:260px;background:radial-gradient(circle,#b8f0ff,transparent 70%);bottom:20%;left:15%;animation-duration:18s;animation-delay:-3s;}
@keyframes drift{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(40px,30px) scale(1.12);}
}

/* ── App shell ── */
.app{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  height:100dvh;
  max-width:820px;margin:0 auto;
  padding:0 16px;
}

/* ── Header ── */
header{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 0 14px;
}
.logo{
  font-size:22px;font-weight:800;letter-spacing:-0.03em;
  color:var(--navy);cursor:default;user-select:none;
}
.logo .plus{
  background:var(--grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.new-chat-btn{
  display:none;
  align-items:center;gap:6px;
  padding:8px 16px;border-radius:24px;border:none;
  background:var(--glass);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1.5px solid var(--glass-border);
  color:var(--navy);font-size:13.5px;font-weight:600;
  cursor:pointer;box-shadow:var(--shadow);
  transition:all .18s;
}
.new-chat-btn:hover{background:rgba(26,107,255,0.08);border-color:var(--blue);}
.new-chat-btn.show{display:flex;}

/* ── Welcome screen ── */
#welcome{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
  padding-bottom:40px;
  animation:fadeIn .5s ease both;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 18px;border-radius:24px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(8px);
  border:1.5px solid rgba(26,107,255,0.18);
  font-size:13px;font-weight:600;color:var(--blue);
  margin-bottom:22px;
  box-shadow:0 2px 12px rgba(26,107,255,0.10);
}

.welcome-title{
  font-size:40px;font-weight:800;
  color:var(--navy);
  letter-spacing:-0.03em;
  text-align:center;
  line-height:1.2;
  margin-bottom:14px;
}
@media(max-width:600px){.welcome-title{font-size:28px;}}

.welcome-sub{
  font-size:16px;color:#5a6e8a;font-weight:400;
  text-align:center;line-height:1.65;
  margin-bottom:36px;
  max-width:480px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  width:100%;max-width:660px;
}
@media(max-width:580px){.cards{grid-template-columns:repeat(2,1fr);}}

.card{
  padding:16px 18px;
  border-radius:18px;
  background:rgba(255,255,255,0.60);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,0.90);
  box-shadow:0 4px 20px rgba(26,107,255,0.08);
  cursor:pointer;
  transition:all .2s;
  text-align:left;
}
.card:hover{
  background:rgba(255,255,255,0.80);
  border-color:rgba(26,107,255,0.25);
  box-shadow:0 8px 28px rgba(26,107,255,0.15);
  transform:translateY(-2px);
}
.card-icon{font-size:20px;margin-bottom:8px;display:block;}
.card-text{font-size:13px;font-weight:600;color:var(--navy);line-height:1.45;}

/* ── Chat ── */
#chat{
  display:none;
  flex:1;overflow-y:auto;
  padding:12px 0 8px;
  scroll-behavior:smooth;
}
#chat.show{display:block;}
#chat::-webkit-scrollbar{width:4px;}
#chat::-webkit-scrollbar-track{background:transparent;}
#chat::-webkit-scrollbar-thumb{background:rgba(26,107,255,0.15);border-radius:4px;}

.msg-row{
  display:flex;align-items:flex-end;gap:10px;
  margin-bottom:16px;
  animation:msgIn .25s ease both;
}
@keyframes msgIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
.msg-row.user{flex-direction:row-reverse;}

.avatar-bot{
  width:36px;height:36px;flex-shrink:0;
  border-radius:12px;
  background:#fff;
  border:2px solid var(--blue);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;
  background:var(--grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  box-shadow:0 2px 10px rgba(26,107,255,0.20);
}
/* override for actual element */
.avatar-bot-wrap{
  width:36px;height:36px;flex-shrink:0;border-radius:12px;
  background:#fff;border:2px solid rgba(26,107,255,0.30);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(26,107,255,0.12);
}
.avatar-bot-wrap span{
  font-size:11px;font-weight:800;letter-spacing:-0.02em;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.bubble{
  max-width:68%;padding:13px 18px;
  border-radius:20px;
  font-size:14.5px;line-height:1.7;
  white-space:pre-wrap;word-break:break-word;
}
.bubble.bot{
  background:rgba(255,255,255,0.68);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,0.95);
  color:var(--navy);
  border-bottom-left-radius:6px;
  box-shadow:0 4px 20px rgba(26,107,255,0.08);
}
.bubble.user{
  background:var(--grad);
  color:#fff;
  border-bottom-right-radius:6px;
  box-shadow:0 4px 20px rgba(26,107,255,0.30);
}

/* ── Typing ── */
.typing-wrap{display:flex;align-items:flex-end;gap:10px;margin-bottom:16px;}
.typing-bubble{
  padding:14px 20px;
  background:rgba(255,255,255,0.68);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,0.95);
  border-radius:20px;border-bottom-left-radius:6px;
  box-shadow:0 4px 20px rgba(26,107,255,0.08);
  display:flex;gap:5px;align-items:center;
}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--blue);opacity:0.5;
  animation:bounce 1.1s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:.18s;}
.dot:nth-child(3){animation-delay:.36s;}
@keyframes bounce{
  0%,60%,100%{transform:translateY(0);opacity:0.5;}
  30%{transform:translateY(-6px);opacity:1;}
}

/* ── Input ── */
.input-wrap{
  flex-shrink:0;
  padding:10px 0 20px;
}
.input-inner{
  display:flex;align-items:flex-end;gap:10px;
  padding:12px 12px 12px 18px;
  border-radius:20px;
  background:rgba(255,255,255,0.68);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1.5px solid rgba(255,255,255,0.92);
  box-shadow:0 4px 24px rgba(26,107,255,0.08);
  transition:border-color .2s,box-shadow .2s;
}
.input-inner:focus-within{
  border-color:rgba(26,107,255,0.40);
  box-shadow:0 0 0 4px rgba(26,107,255,0.10),0 4px 24px rgba(26,107,255,0.10);
}
textarea{
  flex:1;background:transparent;border:none;outline:none;
  resize:none;
  font-family:'Pretendard',sans-serif;
  font-size:15px;color:var(--navy);
  line-height:1.5;
  min-height:24px;max-height:120px;
  overflow-y:auto;
}
textarea::placeholder{color:#9aadca;}
textarea::-webkit-scrollbar{width:3px;}
textarea::-webkit-scrollbar-thumb{background:rgba(26,107,255,0.15);border-radius:3px;}

.send-btn{
  width:42px;height:42px;flex-shrink:0;
  border-radius:13px;border:none;
  background:var(--grad);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s,transform .12s,box-shadow .15s;
  box-shadow:0 4px 14px rgba(26,107,255,0.38);
}
.send-btn:hover:not(:disabled){opacity:.88;transform:scale(1.05);box-shadow:0 6px 20px rgba(26,107,255,0.45);}
.send-btn:active:not(:disabled){transform:scale(.94);}
.send-btn:disabled{opacity:.3;cursor:not-allowed;}
.send-btn svg{width:18px;height:18px;fill:#fff;}

.hint{text-align:center;font-size:11.5px;color:#b0bcd0;margin-top:8px;}
</style>
</head>
<body>

<div class="bg">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
</div>

<div class="app">
  <header>
    <div class="logo">Cowork<span class="plus">+</span></div>
    <button class="new-chat-btn" id="newChatBtn" onclick="resetChat()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      새 대화
    </button>
  </header>

  <!-- Welcome -->
  <div id="welcome">
    <div class="badge">✦ AI 기능 도우미</div>
    <h1 class="welcome-title">궁금한 것을 물어보세요</h1>
    <p class="welcome-sub">카카오톡과 어떻게 다른지, 어떤 기능이 있는지<br>쉽게 알려드릴게요</p>
    <div class="cards">
      <div class="card" onclick="askCard(this)">
        <span class="card-icon">💬</span>
        <div class="card-text">카카오톡이랑 뭐가 달라요?</div>
      </div>
      <div class="card" onclick="askCard(this)">
        <span class="card-icon">👥</span>
        <div class="card-text">여러 명이 같이 채팅할 수 있나요?</div>
      </div>
      <div class="card" onclick="askCard(this)">
        <span class="card-icon">🔖</span>
        <div class="card-text">스레드 기능이 뭐예요?</div>
      </div>
      <div class="card" onclick="askCard(this)">
        <span class="card-icon">✏️</span>
        <div class="card-text">메시지 수정이 되나요?</div>
      </div>
      <div class="card" onclick="askCard(this)">
        <span class="card-icon">📁</span>
        <div class="card-text">대화 기록이 사라지지 않나요?</div>
      </div>
      <div class="card" onclick="askCard(this)">
        <span class="card-icon">🔔</span>
        <div class="card-text">읽음 확인이 되나요?</div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat"></div>

  <!-- Input -->
  <div class="input-wrap">
    <div class="input-inner">
      <textarea id="inputEl" placeholder="궁금한 점을 입력하세요…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="hint">Enter로 전송 · Shift+Enter로 줄바꿈</div>
  </div>
</div>

<script>
const chatEl   = document.getElementById('chat');
const welcomeEl= document.getElementById('welcome');
const inputEl  = document.getElementById('inputEl');
const sendBtn  = document.getElementById('sendBtn');
const newChatBtn=document.getElementById('newChatBtn');

let history = [];
let busy = false;

/* ── Auto-resize ── */
inputEl.addEventListener('input', ()=>{
  inputEl.style.height='auto';
  inputEl.style.height=Math.min(inputEl.scrollHeight,120)+'px';
  sendBtn.disabled = inputEl.value.trim()==='' || busy;
});
inputEl.addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!sendBtn.disabled)send();}
});

function askCard(el){
  const q = el.querySelector('.card-text').textContent;
  inputEl.value=q;
  inputEl.style.height='auto';
  sendBtn.disabled=false;
  send();
}

function showChat(){
  welcomeEl.style.display='none';
  chatEl.classList.add('show');
  newChatBtn.classList.add('show');
}

function resetChat(){
  history=[];
  chatEl.innerHTML='';
  chatEl.classList.remove('show');
  welcomeEl.style.display='flex';
  newChatBtn.classList.remove('show');
  inputEl.value='';
  inputEl.style.height='auto';
  sendBtn.disabled=true;
}

function scrollBot(){chatEl.scrollTop=chatEl.scrollHeight;}

function addMsg(role, text){
  const row=document.createElement('div');
  row.className='msg-row '+(role==='user'?'user':'bot');

  if(role==='bot'){
    const av=document.createElement('div');
    av.className='avatar-bot-wrap';
    av.innerHTML='<span>Co+</span>';
    const b=document.createElement('div');
    b.className='bubble bot';
    b.textContent=text;
    row.appendChild(av);
    row.appendChild(b);
  } else {
    const b=document.createElement('div');
    b.className='bubble user';
    b.textContent=text;
    row.appendChild(b);
  }

  chatEl.appendChild(row);
  scrollBot();
}

function showTyping(){
  const wrap=document.createElement('div');
  wrap.className='typing-wrap';wrap.id='typing';
  const av=document.createElement('div');
  av.className='avatar-bot-wrap';av.innerHTML='<span>Co+</span>';
  const tb=document.createElement('div');
  tb.className='typing-bubble';
  tb.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  wrap.appendChild(av);wrap.appendChild(tb);
  chatEl.appendChild(wrap);scrollBot();
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

async function send(){
  const text=inputEl.value.trim();
  if(!text||busy)return;
  busy=true;sendBtn.disabled=true;
  inputEl.value='';inputEl.style.height='auto';

  showChat();
  addMsg('user',text);
  history.push({role:'user',content:text});
  showTyping();

  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history})
    });
    removeTyping();
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      addMsg('bot',`앗, 오류가 생겼어요: ${err.error||res.status}\nAPI 키 설정을 확인해 주세요!`);
    } else {
      const data=await res.json();
      const reply=data.reply||'(응답 없음)';
      addMsg('bot',reply);
      history.push({role:'assistant',content:reply});
    }
  } catch(e){
    removeTyping();
    addMsg('bot',`인터넷 연결을 확인해 주세요. (${e.message})`);
  }

  busy=false;
  sendBtn.disabled=inputEl.value.trim()==='';
}
</script>
</body>
</html>
